<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline Tracker</title>
<meta name="theme-color" content="#0f172a">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#0f172a; --card:#1e293b; --accent:#22c55e;
  --danger:#ef4444; --text:#e2e8f0;
}
body {margin:0;font-family:system-ui;background:var(--bg);color:var(--text);}
.container {max-width:420px;margin:auto;padding:16px;}
.card {background:var(--card);padding:14px;border-radius:14px;margin-bottom:12px;}

.input-row {display:flex;justify-content:space-between;margin:6px 0;}
input {
  width:80px;padding:6px;border-radius:8px;border:none;text-align:center;
}

button {
  padding:10px;border:none;border-radius:8px;
  background:var(--accent);font-weight:bold;
}

.stats {display:flex;text-align:center;}
.stat {flex:1;}

#streak.glow {
  color:#22c55e;
  text-shadow:0 0 8px #22c55e,0 0 16px #22c55e;
}

.calendar {
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:5px;margin-top:10px;
}
.day {
  height:36px;border-radius:6px;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}
.green{background:var(--accent);}
.red{background:var(--danger);}
.empty{background:#334155;}
.today{outline:2px solid yellow;}

canvas {width:100%;display:block;}

.nav {
  display:flex;justify-content:space-between;align-items:center;
}

.progress {
  height:10px;background:#334155;border-radius:6px;margin-top:8px;
}
.bar {
  height:10px;background:#22c55e;border-radius:6px;width:0%;
  transition:width 0.4s ease;
}
</style>
</head>

<body>
<div class="container">

<h2>🔥 Discipline</h2>

<div class="card">
  <div class="input-row">Study (hrs) <input id="study" type="number" step="0.5"></div>
  <div class="input-row">Skill (hrs) <input id="skill" type="number" step="0.5"></div>
  <div class="input-row">Exercise (hrs) <input id="exercise" type="number" step="0.5"></div>
  <div class="input-row">Sleep (hrs) <input id="sleep" type="number" step="0.5"></div>

  <button style="width:100%;margin-top:10px;" onclick="save()">Save Today</button>
</div>

<div class="card stats">
  <div class="stat"><div id="streak">🔥 0</div><small>Streak</small></div>
  <div class="stat"><div id="score">-</div><small>Score</small></div>
  <div class="stat"><div id="percent">0%</div><small>Success</small></div>
</div>

<div class="card">
  <div>Daily Progress</div>
  <div class="progress"><div id="progressBar" class="bar"></div></div>
</div>

<div class="card">
  <div class="nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<div class="card">
  <canvas id="graph"></canvas>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("tracker")) || [];
let current = new Date();
let touchStartX = 0;

function getToday(){return new Date().toISOString().split("T")[0];}

function calculateScore(d){
  let s=0;
  if(d.study>=2)s+=2;
  if(d.skill>=1)s+=2;
  if(d.exercise>=1)s+=1;
  if(d.sleep>=7)s+=1;
  return s;
}

function save(){
  let today=getToday();

  let entry={
    date:today,
    study:+study.value||0,
    skill:+skill.value||0,
    exercise:+exercise.value||0,
    sleep:+sleep.value||0
  };

  data=data.filter(d=>d.date!==today);
  data.push(entry);

  localStorage.setItem("tracker",JSON.stringify(data));

  study.value=""; skill.value=""; exercise.value=""; sleep.value="";

  render();
}

function calculateStreak(){
  let sorted=[...data].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let s=0;
  for(let d of sorted){
    if(calculateScore(d)>=4)s++;
    else break;
  }
  return s;
}

function successPercent(){
  if(data.length===0)return 0;
  let good=data.filter(d=>calculateScore(d)>=4).length;
  return Math.round((good/data.length)*100);
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  let y=current.getFullYear();
  let m=current.getMonth();

  document.getElementById("monthLabel").textContent =
    current.toLocaleString("default",{month:"long",year:"numeric"});

  let days=new Date(y,m+1,0).getDate();

  for(let i=1;i<=days;i++){
    let dateStr=new Date(y,m,i).toISOString().split("T")[0];
    let entry=data.find(d=>d.date===dateStr);

    let div=document.createElement("div");
    div.classList.add("day");

    if(entry){
      div.classList.add(calculateScore(entry)>=4?"green":"red");
    } else div.classList.add("empty");

    if(dateStr===getToday())div.classList.add("today");

    div.textContent=i;
    cal.appendChild(div);
  }
}

function changeMonth(x){
  current.setMonth(current.getMonth()+x);
  renderCalendar();
}

document.addEventListener("touchstart", e=>{
  touchStartX=e.changedTouches[0].screenX;
});
document.addEventListener("touchend", e=>{
  let diff=touchStartX-e.changedTouches[0].screenX;
  if(Math.abs(diff)>50){
    current.setMonth(current.getMonth()+(diff>0?1:-1));
    renderCalendar();
  }
});

function drawGraph(){
  let canvas=document.getElementById("graph");
  let ctx=canvas.getContext("2d");

  canvas.width=300;
  canvas.height=150;

  let last7=[...data].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-7);

  let frame=0;

  function animate(){
    ctx.clearRect(0,0,300,150);

    last7.forEach((d,i)=>{
      let score=calculateScore(d);
      let target=(score/6)*120;
      let h=target*(frame/20);

      ctx.fillStyle="#22c55e";
      ctx.fillRect(i*40+10,140-h,20,h);
    });

    if(frame<20){
      frame++;
      requestAnimationFrame(animate);
    }
  }

  animate();
}

function render(){
  let todayEntry=data.find(d=>d.date===getToday());

  let streak=calculateStreak();
  let streakEl=document.getElementById("streak");

  streakEl.textContent=`🔥 ${streak}`;

  if(streak>=3) streakEl.classList.add("glow");
  else streakEl.classList.remove("glow");

  let score=todayEntry?calculateScore(todayEntry):0;
  document.getElementById("score").textContent = todayEntry ? score+"/6" : "-";
  document.getElementById("percent").textContent = successPercent()+"%";

  document.getElementById("progressBar").style.width = (score/6)*100 + "%";

  renderCalendar();
  drawGraph();
}

render();
</script>

</body>
</html>
